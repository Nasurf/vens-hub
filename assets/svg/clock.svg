<svg width="200" height="200" viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
    <!-- 
      A semi-realistic clock SVG asset.
      - Uses gradients for a subtle 3D effect.
      - Slightly cartoony but clean, inspired by Figma assets.
    -->

    <!-- Define gradients and filters -->
    <defs>
        <radialGradient id="faceGradient" cx="50%" cy="50%" r="50%" fx="50%" fy="50%">
            <stop offset="0%" style="stop-color:#f8fafc; stop-opacity:1" />
            <stop offset="90%" style="stop-color:#e2e8f0; stop-opacity:1" />
            <stop offset="100%" style="stop-color:#cbd5e1; stop-opacity:1" />
        </radialGradient>
        <linearGradient id="bezelGradient" x1="0%" y1="0%" x2="100%" y2="100%">
            <stop offset="0%" style="stop-color:#e2e8f0;" />
            <stop offset="100%" style="stop-color:#94a3b8;" />
        </linearGradient>
        <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
            <feGaussianBlur in="SourceAlpha" stdDeviation="3" result="blur"/>
            <feOffset in="blur" dx="2" dy="2" result="offsetBlur"/>
            <feMerge>
                <feMergeNode in="offsetBlur" />
                <feMergeNode in="SourceGraphic" />
            </feMerge>
        </filter>
    </defs>

    <!-- Clock Body -->
    <g filter="url(#shadow)">
        <!-- Outer Bezel -->
        <circle cx="100" cy="100" r="98" fill="url(#bezelGradient)" />
        <!-- Inner Face -->
        <circle cx="100" cy="100" r="90" fill="url(#faceGradient)" stroke="#94a3b8" stroke-width="2"/>
    </g>

    <!-- Clock Markings -->
    <g transform="translate(100, 100)">
        <g id="markings">
            <!-- Hour markings -->
            <line x1="0" y1="-85" x2="0" y2="-70" stroke="#334155" stroke-width="4" stroke-linecap="round" />
            <line x1="0" y1="-85" x2="0" y2="-70" stroke="#334155" stroke-width="4" stroke-linecap="round" transform="rotate(30)" />
            <line x1="0" y1="-85" x2="0" y2="-70" stroke="#334155" stroke-width="4" stroke-linecap="round" transform="rotate(60)" />
            <line x1="0" y1="-85" x2="0" y2="-70" stroke="#334155" stroke-width="4" stroke-linecap="round" transform="rotate(90)" />
            <line x1="0" y1="-85" x2="0" y2="-70" stroke="#334155" stroke-width="4" stroke-linecap="round" transform="rotate(120)" />
            <line x1="0" y1="-85" x2="0" y2="-70" stroke="#334155" stroke-width="4" stroke-linecap="round" transform="rotate(150)" />
            <line x1="0" y1="-85" x2="0" y2="-70" stroke="#334155" stroke-width="4" stroke-linecap="round" transform="rotate(180)" />
            <line x1="0" y1="-85" x2="0" y2="-70" stroke="#334155" stroke-width="4" stroke-linecap="round" transform="rotate(210)" />
            <line x1="0" y1="-85" x2="0" y2="-70" stroke="#334155" stroke-width="4" stroke-linecap="round" transform="rotate(240)" />
            <line x1="0" y1="-85" x2="0" y2="-70" stroke="#334155" stroke-width="4" stroke-linecap="round" transform="rotate(270)" />
            <line x1="0" y1="-85" x2="0" y2="-70" stroke="#334155" stroke-width="4" stroke-linecap="round" transform="rotate(300)" />
            <line x1="0" y1="-85" x2="0" y2="-70" stroke="#334155" stroke-width="4" stroke-linecap="round" transform="rotate(330)" />
        </g>
    </g>

    <!-- Clock Hands -->
    <g transform="translate(100, 100) rotate(180)"> <!-- Set to 10:10 for classic look -->
        <!-- Hour Hand -->
        <g transform="rotate(60)">
             <rect x="-5" y="-60" width="10" height="65" fill="#334155" rx="5" ry="5"/>
        </g>
        <!-- Minute Hand -->
        <g transform="rotate(-30)">
             <rect x="-4" y="-80" width="8" height="85" fill="#475569" rx="4" ry="4"/>
        </g>
        <!-- Second Hand -->
        <g transform="rotate(120)">
             <rect x="-1.5" y="-85" width="3" height="95" fill="#ef4444" rx="1.5" ry="1.5"/>
             <circle cx="0" cy="0" r="6" fill="#ef4444"/>
        </g>
    </g>
    
    <!-- Center Pin -->
    <circle cx="100" cy="100" r="8" fill="#334155"/>
    <circle cx="100" cy="100" r="4" fill="#f8fafc"/>
</svg>

